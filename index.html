<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation Flip</title>

<style>
  /* Make front a positioning container */
.front {
  position: relative;
}

/* Swipe hint */
.swipe-hint {
  position: absolute;
  bottom: 15px;
  right: 15px;
  font-size: 14px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 8px 14px;
  border-radius: 20px;
  font-style: italic;
  z-index: 10;   /* 🔥 VERY IMPORTANT */
  
  animation: slideHint 1.5s infinite;
}

/* Animation */
@keyframes slideHint {
  0% { transform: translateX(0); opacity: 0.7; }
  50% { transform: translateX(10px); opacity: 1; }
  100% { transform: translateX(0); opacity: 0.7; }
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f5f5f5;
  margin: 0;
}

/* Card Container */
.card {
  width: 350px;
  height: 500px;
  perspective: 1000px;
}

/* Inner Flip */
.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.card.flip .inner {
  transform: rotateY(180deg);
}

/* Front & Back */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 12px;
  overflow: hidden;
}

/* Front Image */
.front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Back Side */
.back {
  transform: rotateY(180deg);
  display: flex;
  justify-content: center;
  align-items: center;
  background: #fffaf5;
}

/* QR Container */
.qr-container {
  text-align: center;
  padding: 20px;
  border: 2px solid #b22222;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  background: white;
}

/* Title Above QR */
.qr-title {
  font-size: 18px;
  font-weight: bold;
  color: #b22222;
  margin-bottom: 15px;
  font-family: "Georgia", serif;
  letter-spacing: 1px;
}

/* QR Image */
.qr-container img {
  width: 300px;
  height: 300px;
  object-fit: contain;
}

/* Optional subtitle */
.qr-text {
  margin-top: 10px;
  font-size: 14px;
  color: #555;
  font-style: italic;
}
</style>
</head>

<body>

<div class="card" id="card">
  <div class="inner">

    <!-- FRONT -->
    <div class="front">
      <img src="Invitation card.png" alt="Invitation">
        <div class="swipe-hint">
    Tap / Swipe →
  </div>
    </div>

    <!-- BACK -->
    <div class="back">
      <div class="qr-container">
        <div class="qr-title">Location for the Event</div>
        <img src="fnail (1).png" alt="QR Code">
        <div class="qr-text">Scan to view venue 📍</div>
      </div>
    </div>

  </div>
</div>

<script>
let card = document.getElementById("card");

let startX = 0;
let isDragging = false;

/* Mobile Swipe */
card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (Math.abs(startX - endX) > 50) {
    card.classList.toggle("flip");
  }
});

/* Desktop Drag */
card.addEventListener("mousedown", e => {
  isDragging = true;
  startX = e.clientX;
});

card.addEventListener("mouseup", e => {
  if (!isDragging) return;
  let endX = e.clientX;

  if (Math.abs(startX - endX) > 50) {
    card.classList.toggle("flip");
  }

  isDragging = false;
});

/* Click fallback */
card.addEventListener("click", () => {
  card.classList.toggle("flip");
});
</script>

</body>
</html>
